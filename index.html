<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Verified — MPTI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
 
    /* ── both canvas layers ── */
    #c-burst, #c-fall {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #c-burst { z-index: 1; }
    #c-fall  { z-index: 0; }
 
    /* ── content ── */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(16px);
      animation: up 0.55s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    }
    @keyframes up {
      to { opacity: 1; transform: translateY(0); }
    }
 
    .logo {
      height: 46px;
      margin-bottom: 28px;
      opacity: 0;
      animation: up 0.4s ease 0.4s forwards;
    }
 
    /* ── SVG check animation ── */
    .check-svg-wrap {
      margin-bottom: 20px;
      opacity: 0;
      animation: up 0.4s ease 0.5s forwards;
    }
 
    .check-svg { overflow: visible; }
 
    /* outer ring draw */
    .ring-draw {
      fill: none;
      stroke: #22c55e;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 283;   /* 2π×45 */
      stroke-dashoffset: 283;
      animation: drawRing 0.7s cubic-bezier(.4,0,.2,1) 0.6s forwards;
    }
    @keyframes drawRing {
      to { stroke-dashoffset: 0; }
    }
 
    /* inner fill pulse */
    .ring-fill {
      fill: #dcfce7;
      opacity: 0;
      animation: fillPop 0.3s ease 1.25s forwards;
    }
    @keyframes fillPop {
      to { opacity: 1; }
    }
 
    /* checkmark draw */
    .check-mark {
      fill: none;
      stroke: #16a34a;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 90;
      stroke-dashoffset: 90;
      animation: drawCheck 0.4s cubic-bezier(.4,0,.2,1) 1.3s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
 
    /* little burst dots around the ring */
    .dot {
      fill: #22c55e;
      opacity: 0;
      transform-origin: 50px 50px;
    }
    .dot:nth-child(1)  { animation: dotPop 0.4s ease 1.55s forwards; }
    .dot:nth-child(2)  { animation: dotPop 0.4s ease 1.6s  forwards; }
    .dot:nth-child(3)  { animation: dotPop 0.4s ease 1.65s forwards; }
    .dot:nth-child(4)  { animation: dotPop 0.4s ease 1.7s  forwards; }
    .dot:nth-child(5)  { animation: dotPop 0.4s ease 1.75s forwards; }
    .dot:nth-child(6)  { animation: dotPop 0.4s ease 1.8s  forwards; }
    .dot:nth-child(7)  { animation: dotPop 0.4s ease 1.85s forwards; }
    .dot:nth-child(8)  { animation: dotPop 0.4s ease 1.9s  forwards; }
    @keyframes dotPop {
      0%   { opacity: 1; transform: scale(0); }
      60%  { opacity: 1; transform: scale(1.3); }
      100% { opacity: 0; transform: scale(1); }
    }
 
    .pill {
      background: #dcfce7;
      color: #16a34a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 12px;
      opacity: 0;
      animation: up 0.4s ease 1.6s forwards;
    }
 
    h1 {
      font-size: 52px;
      font-weight: 900;
      color: #111;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 8px;
      opacity: 0;
      animation: up 0.4s ease 1.7s forwards;
    }
    h1 em { font-style: normal; color: #0ea5e9; }
 
    .sub {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 32px;
      opacity: 0;
      animation: up 0.4s ease 1.8s forwards;
    }
 
    /* countdown ring */
    .timer {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      opacity: 0;
      animation: up 0.4s ease 1.9s forwards;
    }
    .ring-c { position: relative; width: 56px; height: 56px; }
    .ring-c svg { width: 56px; height: 56px; transform: rotate(-90deg); }
    .rc-track { fill: none; stroke: #f0f0f0; stroke-width: 4; }
    .rc-prog  {
      fill: none; stroke: #0ea5e9; stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 151;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #111;
    }
    .timer-label { font-size: 12px; color: #bbb; }
 
    .skip {
      margin-top: 16px; font-size: 13px; color: #d1d5db;
      opacity: 0; animation: up 0.4s ease 2.0s forwards;
    }
    .skip a { color: #0ea5e9; text-decoration: none; font-weight: 600; }
 
    .badges {
      position: fixed; bottom: 20px;
      display: flex; gap: 8px; z-index: 3;
      opacity: 0; animation: up 0.4s ease 2.1s forwards;
    }
    .badge {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: #c4c4c4; border: 1px solid #eee;
      padding: 4px 10px; border-radius: 4px;
    }
  </style>
</head>
<body>
 
<!-- layer 0: falling confetti -->
<canvas id="c-fall"></canvas>
<!-- layer 1: burst confetti -->
<canvas id="c-burst"></canvas>
 
<div class="content">
 
  <img class="logo"
    src="https://mptigh.com/wp-content/uploads/2023/01/cropped-cropped-MPTI-ICON-1.png"
    onerror="this.style.display='none'" alt="MPTI" />
 
  <!-- SVG check animation -->
  <div class="check-svg-wrap">
    <svg class="check-svg" width="160" height="160" viewBox="0 0 100 100">
      <!-- fill first (behind stroke) -->
      <circle class="ring-fill" cx="50" cy="50" r="44"/>
      <!-- animated ring -->
      <circle class="ring-draw" cx="50" cy="50" r="45"/>
      <!-- checkmark -->
      <path class="check-mark" d="M28 50 L43 66 L72 34"/>
      <!-- burst dots around ring at 8 positions -->
      <circle class="dot" cx="50" cy="1"  r="3.5"/>
      <circle class="dot" cx="85" cy="15" r="3"/>
      <circle class="dot" cx="99" cy="50" r="3.5"/>
      <circle class="dot" cx="85" cy="85" r="3"/>
      <circle class="dot" cx="50" cy="99" r="3.5"/>
      <circle class="dot" cx="15" cy="85" r="3"/>
      <circle class="dot" cx="1"  cy="50" r="3.5"/>
      <circle class="dot" cx="15" cy="15" r="3"/>
    </svg>
  </div>
 
  <span class="pill">✓ &nbsp;Verified</span>
  <h1>Certificate<br><em>Confirmed.</em></h1>
  <p class="sub">Issued by MAC Partners Training Institute</p>
 
  <div class="timer">
    <div class="ring-c">
      <svg viewBox="0 0 56 56">
        <circle class="rc-track" cx="28" cy="28" r="24"/>
        <circle class="rc-prog"  cx="28" cy="28" r="24" id="rp"/>
      </svg>
      <div class="ring-num" id="count">5</div>
    </div>
    <span class="timer-label">Redirecting…</span>
  </div>
 
  <p class="skip">Or <a href="https://mptigh.com/verify/">go there now</a></p>
</div>
 
<div class="badges">
  <span class="badge">City &amp; Guilds</span>
  <span class="badge">CTVET</span>
  <span class="badge">AWS</span>
</div>
 
<script>
const W = window.innerWidth, H = window.innerHeight;
const COLORS = ['#c1121f','#0ea5e9','#22c55e','#f59e0b','#a855f7','#ec4899','#f97316','#14b8a6'];
function rand(a,b){ return Math.random()*(b-a)+a; }
 
/* ══════════════════════════════════════
   1. BURST confetti — explodes outward
   from centre when checkmark fires (~1.5s)
══════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('c-burst');
  const ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;
 
  const CX = W/2, CY = H/2 - 60; // approx centre of check circle
 
  const particles = [];
  const COUNT = 80;
 
  function spawn(){
    particles.length = 0;
    for(let i=0;i<COUNT;i++){
      const angle = rand(0, Math.PI*2);
      const speed = rand(3, 11);
      particles.push({
        x: CX, y: CY,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - rand(1,3),
        r: rand(4,9),
        color: COLORS[Math.floor(Math.random()*COLORS.length)],
        alpha: 1,
        rot: rand(0, Math.PI*2),
        rotV: rand(-0.2, 0.2),
        w: rand(6,13), h: rand(4,8),
        shape: Math.random()>0.45 ? 'rect':'circle',
        gravity: rand(0.18, 0.35)
      });
    }
    requestAnimationFrame(loop);
  }
 
  function loop(){
    ctx.clearRect(0,0,W,H);
    let alive = false;
    particles.forEach(p=>{
      if(p.alpha<=0) return;
      alive = true;
      p.vy += p.gravity;
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot+= p.rotV;
      p.alpha -= 0.012;
 
      ctx.save();
      ctx.globalAlpha = Math.max(0,p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape==='rect'){
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.r/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
    if(alive) requestAnimationFrame(loop);
    else ctx.clearRect(0,0,W,H);
  }
 
  // fire when check animates in
  setTimeout(spawn, 1500);
})();
 
 
/* ══════════════════════════════════════
   2. FALLING confetti — rains from top
   starts immediately, lasts ~5s
══════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('c-fall');
  const ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;
 
  const pieces = [];
  const COUNT = 140;
 
  for(let i=0;i<COUNT;i++){
    pieces.push({
      x:    rand(0, W),
      y:    rand(-H*1.2, 0),
      vx:   rand(-1.2, 1.2),
      vy:   rand(2, 5.5),
      r:    rand(4,10),
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      rot:  rand(0, Math.PI*2),
      rotV: rand(-0.1, 0.1),
      w:    rand(7,14), h: rand(4,9),
      shape: Math.random()>0.5 ? 'rect':'circle',
      alpha: rand(0.7, 1)
    });
  }
 
  let start = null;
  const LIFE = 5500;
 
  function loop(ts){
    if(!start) start = ts;
    const elapsed = ts - start;
    const fade = elapsed > LIFE - 900 ? Math.max(0, 1-(elapsed-(LIFE-900))/900) : 1;
 
    ctx.clearRect(0,0,W,H);
 
    pieces.forEach(p=>{
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.rotV;
      if(p.y > H+20){ p.y=-20; p.x=rand(0,W); }
 
      ctx.save();
      ctx.globalAlpha = p.alpha * fade;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape==='rect'){
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.r/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
 
    if(elapsed < LIFE) requestAnimationFrame(loop);
    else ctx.clearRect(0,0,W,H);
  }
 
  setTimeout(()=>requestAnimationFrame(loop), 300);
})();
 
 
/* ══════════════════════════════════════
   3. Countdown + redirect
══════════════════════════════════════ */
const DEST  = 'https://mptigh.com/verify/';
const TOTAL = 5;
const CIRC  = 151;
 
let n = TOTAL;
const countEl = document.getElementById('count');
const rpEl    = document.getElementById('rp');
rpEl.style.strokeDashoffset = 0;
 
setTimeout(()=>{
  const t = setInterval(()=>{
    n--;
    countEl.textContent = n;
    rpEl.style.strokeDashoffset = CIRC*(1-n/TOTAL);
    if(n<=0){ clearInterval(t); window.location.href=DEST; }
  }, 1000);
}, 1000);
</script>
</body>
</html>
