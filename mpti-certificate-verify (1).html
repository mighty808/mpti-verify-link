<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Verified — MPTI</title>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* canvas confetti behind everything */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(18px);
      animation: up 0.55s cubic-bezier(.22,1,.36,1) 0.3s forwards;
    }

    @keyframes up {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      height: 48px;
      margin-bottom: 30px;
      opacity: 0;
      animation: up 0.4s ease 0.5s forwards;
    }

    .check-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) 0.7s both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    .check-wrap svg { width: 48px; height: 48px; }

    .check-path {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: draw 0.5s ease 1.1s forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    .pill {
      background: #dcfce7;
      color: #16a34a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      opacity: 0;
      animation: up 0.4s ease 0.95s forwards;
    }

    h1 {
      font-size: 40px;
      font-weight: 800;
      color: #111;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 8px;
      opacity: 0;
      animation: up 0.4s ease 1.05s forwards;
    }

    h1 em {
      font-style: normal;
      color: #0ea5e9;
    }

    .sub {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 34px;
      opacity: 0;
      animation: up 0.4s ease 1.15s forwards;
    }

    /* countdown */
    .timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: up 0.4s ease 1.25s forwards;
    }

    .ring {
      position: relative;
      width: 58px;
      height: 58px;
    }
    .ring svg {
      width: 58px; height: 58px;
      transform: rotate(-90deg);
    }
    .ring-track { fill: none; stroke: #f0f0f0; stroke-width: 4; }
    .ring-prog  {
      fill: none; stroke: #0ea5e9;
      stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 157;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; font-weight: 800; color: #111;
    }

    .timer-label {
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.3px;
    }

    .skip {
      margin-top: 18px;
      font-size: 13px;
      color: #d1d5db;
      opacity: 0;
      animation: up 0.4s ease 1.4s forwards;
    }
    .skip a { color: #0ea5e9; text-decoration: none; font-weight: 600; }

    .badges {
      position: fixed; bottom: 20px;
      display: flex; gap: 8px; z-index: 2;
      opacity: 0;
      animation: up 0.4s ease 1.5s forwards;
    }
    .badge {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: #c4c4c4; border: 1px solid #eee;
      padding: 4px 10px; border-radius: 4px;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="content">

  <img
    class="logo"
    src="https://mptigh.com/wp-content/uploads/2023/01/cropped-cropped-MPTI-ICON-1.png"
    onerror="this.style.display='none'"
    alt="MPTI"
  />

  <div class="check-wrap">
    <svg viewBox="0 0 48 48" fill="none">
      <path
        class="check-path"
        d="M12 24L21 33L36 16"
        stroke="#22c55e"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </div>

  <span class="pill">✓ &nbsp;Verified</span>
  <h1>Certificate<br><em>Confirmed.</em></h1>
  <p class="sub">Issued by MAC Partners Training Institute</p>

  <div class="timer">
    <div class="ring">
      <svg viewBox="0 0 58 58">
        <circle class="ring-track" cx="29" cy="29" r="25"/>
        <circle class="ring-prog"  cx="29" cy="29" r="25" id="rp"/>
      </svg>
      <div class="ring-num" id="count">5</div>
    </div>
    <span class="timer-label">Redirecting…</span>
  </div>

  <p class="skip">Or <a href="https://mptigh.com/verify/">go there now</a></p>

</div>

<div class="badges">
  <span class="badge">City &amp; Guilds</span>
  <span class="badge">CTVET</span>
  <span class="badge">AWS</span>
</div>

<script>
/* ── Canvas Confetti ─────────────────────────────────────── */
(function(){
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');

  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;

  const COLORS = ['#c1121f','#0ea5e9','#22c55e','#f59e0b','#a855f7','#ec4899','#f97316'];
  const PIECES = [];
  const COUNT  = 160;

  function rand(a, b){ return Math.random()*(b-a)+a; }

  for(let i=0;i<COUNT;i++){
    PIECES.push({
      x:  rand(0, W),
      y:  rand(-H, 0),          // start above viewport
      r:  rand(5, 11),
      d:  rand(2, 5),            // fall speed
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      tilt: rand(-10,10),
      tiltSpeed: rand(0.04, 0.12),
      angle: rand(0, Math.PI*2),
      spin:  rand(-0.08, 0.08),
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
      w: rand(6,14), h: rand(4,9)
    });
  }

  let alive = true;
  let startTime = null;
  const DURATION = 4500; // confetti lives 4.5s

  function draw(ts){
    if(!startTime) startTime = ts;
    const elapsed = ts - startTime;

    ctx.clearRect(0,0,W,H);

    // fade out toward end
    const alpha = elapsed > DURATION - 800
      ? Math.max(0, 1 - (elapsed - (DURATION-800))/800)
      : 1;

    PIECES.forEach(p => {
      ctx.save();
      ctx.globalAlpha = alpha * rand(0.7,1);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;

      if(p.shape === 'rect'){
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.r/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();

      // physics
      p.y      += p.d;
      p.x      += Math.sin(p.angle) * 1.2;
      p.angle  += p.spin;
      p.tilt   += p.tiltSpeed;

      // wrap vertically
      if(p.y > H + 20) p.y = -20;
    });

    if(elapsed < DURATION) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,W,H);
  }

  // Fire after short delay so page loads first
  setTimeout(() => requestAnimationFrame(draw), 600);
})();


/* ── Countdown + Redirect ────────────────────────────────── */
const DEST  = 'https://mptigh.com/verify/';
const TOTAL = 5;
const CIRC  = 157; // 2π×25

let n = TOTAL;
const countEl = document.getElementById('count');
const rpEl    = document.getElementById('rp');

rpEl.style.strokeDashoffset = 0;

setTimeout(() => {
  const t = setInterval(() => {
    n--;
    countEl.textContent = n;
    rpEl.style.strokeDashoffset = CIRC * (1 - n/TOTAL);
    if(n <= 0){ clearInterval(t); window.location.href = DEST; }
  }, 1000);
}, 1000);
</script>

</body>
</html>
